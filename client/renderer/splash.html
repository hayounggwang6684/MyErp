<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunjin ERP Splash</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="splash-body">
    <main class="splash-shell">
      <p class="brand-top">SHERWOOD</p>
      <h1 class="splash-title">(주)선진종합 ERP</h1>
      <p class="splash-copy">앱 시작 중입니다. 업데이트와 연결 상태를 먼저 점검합니다.</p>
      <div class="splash-status-card">
        <div class="splash-spinner" aria-hidden="true"></div>
        <div>
          <p id="splash-status-title" class="splash-status-title">시작 준비 중</p>
          <p id="splash-status-message" class="splash-status-message">최신 상태를 확인하고 있습니다.</p>
        </div>
      </div>
    </main>
    <script src="./splash.js"></script>
  </body>
  </html>
