<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP Admin Login</title>
    <link rel="stylesheet" href="./prototype.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="brand-panel">
        <p class="brand-top">SHERWOOD</p>
        <h1 class="brand-title">(주)선진종합</h1>
        <p class="brand-subtitle">
          관리자 로컬 전용 로그인. 사용자 관리, 권한 변경, 감사 로그 조회 같은 민감 기능은 이 경로에서만 다룹니다.
        </p>
      </section>
      <section class="auth-side">
        <article class="auth-card">
          <div class="topline">
            <span class="local-badge">관리자 로컬 전용</span>
            <span class="status-badge ok">접속 인증서 확인 완료</span>
          </div>
          <h2 class="card-title">관리자 로그인</h2>
          <p class="card-copy">배포 경계 기준으로 Mac mini 현지 접속만 허용된다는 전제의 시연 화면</p>

          <div class="field">
            <label for="admin-id">관리자 아이디</label>
            <input id="admin-id" class="text-field" value="admin.root" />
          </div>

          <div class="field">
            <label for="admin-password">비밀번호</label>
            <input id="admin-password" class="password-field" type="password" value="12345678" />
          </div>

          <div class="message info">민감 작업은 로그인 후에도 재인증이 추가로 요구됩니다.</div>

          <div class="button-row">
            <a class="primary-button" href="./dashboard.html">관리자 로그인</a>
            <a class="secondary-button" href="./login.html">일반 로그인</a>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
