name: Client Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to upload assets to (for example: v0.1.1)"
        required: true
        default: "v0.1.1"
      ref:
        description: "Git ref to build from"
        required: false
        default: "master"

permissions:
  contents: write

concurrency:
  group: client-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-windows-client:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Cloudflare Access client config
        shell: bash
        env:
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
        run: |
          if [ -n "$CLOUDFLARE_ACCESS_CLIENT_ID" ] && [ -n "$CLOUDFLARE_ACCESS_CLIENT_SECRET" ]; then
            printf '%s\n' \
              'module.exports = {' \
              '  serverUrl: "https://sunjincmk-dev.site",' \
              '  cloudflareAccess: {' \
              '    enabled: true,' \
              "    clientId: \"${CLOUDFLARE_ACCESS_CLIENT_ID}\"," \
              "    clientSecret: \"${CLOUDFLARE_ACCESS_CLIENT_SECRET}\"," \
              '  },' \
              '};' \
              > client/constants.generated.js
            echo "Cloudflare Access client config injected."
          else
            echo "Cloudflare Access secrets not configured. Building without Access client headers."
          fi

      - name: Build Windows release assets
        run: npm run client:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure release exists
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap

  build-macos-client:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Cloudflare Access client config
        shell: bash
        env:
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
        run: |
          if [ -n "$CLOUDFLARE_ACCESS_CLIENT_ID" ] && [ -n "$CLOUDFLARE_ACCESS_CLIENT_SECRET" ]; then
            printf '%s\n' \
              'module.exports = {' \
              '  serverUrl: "https://sunjincmk-dev.site",' \
              '  cloudflareAccess: {' \
              '    enabled: true,' \
              "    clientId: \"${CLOUDFLARE_ACCESS_CLIENT_ID}\"," \
              "    clientSecret: \"${CLOUDFLARE_ACCESS_CLIENT_SECRET}\"," \
              '  },' \
              '};' \
              > client/constants.generated.js
            echo "Cloudflare Access client config injected."
          else
            echo "Cloudflare Access secrets not configured. Building without Access client headers."
          fi

      - name: Build macOS release assets
        run: npm run client:dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure release exists
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: |
            release/*.dmg
            release/*.zip
            release/*latest*.yml
