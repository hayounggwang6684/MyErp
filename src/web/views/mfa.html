<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PAGE_TITLE}}</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="brand-panel">
        <p class="brand-top">SHERWOOD</p>
        <h1 class="brand-title">(주)선진종합</h1>
        <p class="brand-subtitle">
          외부 접속은 2차 인증을 통과해야 대시보드에 진입할 수 있습니다. 실제 TOTP 연동 전까지는 고정 데모 OTP를 사용합니다.
        </p>
        <div class="brand-tags">
          <span>TOTP</span>
          <span>Session Control</span>
          <span>Audit Ready</span>
        </div>
      </section>
      <section class="auth-side">
        <article class="auth-card">
          <div class="topline">
            <span class="status-badge ok">2차 인증 필요</span>
          </div>
          <h2 class="card-title">2차 인증</h2>
          <p class="card-copy">API 연계: <code>POST /api/v1/auth/mfa/verify</code></p>

          <form id="mfa-form">
            <div class="field">
              <label for="otp-code">OTP 코드</label>
              <div class="otp-row">
                <input class="otp-field" maxlength="1" inputmode="numeric" value="1" />
                <input class="otp-field" maxlength="1" inputmode="numeric" value="2" />
                <input class="otp-field" maxlength="1" inputmode="numeric" value="3" />
                <input class="otp-field" maxlength="1" inputmode="numeric" value="4" />
                <input class="otp-field" maxlength="1" inputmode="numeric" value="5" />
                <input class="otp-field" maxlength="1" inputmode="numeric" value="6" />
              </div>
            </div>

            <div id="feedback" class="message {{FEEDBACK_CLASS}}">{{FEEDBACK_MESSAGE}}</div>

            <div class="button-row">
              <button class="primary-button" type="submit">인증</button>
              <a class="secondary-button" href="/login">다시 로그인</a>
            </div>
          </form>
        </article>
      </section>
    </main>
    <script>
      const mfaForm = document.getElementById("mfa-form");
      const feedback = document.getElementById("feedback");
      const inputs = Array.from(document.querySelectorAll(".otp-field"));

      inputs.forEach((input, index) => {
        input.addEventListener("input", () => {
          if (input.value && inputs[index + 1]) {
            inputs[index + 1].focus();
          }
        });
      });

      mfaForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const otpCode = inputs.map((input) => input.value).join("");

        const response = await fetch("/api/v1/auth/mfa/verify", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ otp_code: otpCode })
        });

        const result = await response.json();

        if (!response.ok) {
          feedback.className = "message error";
          feedback.textContent = result.message || "인증에 실패했습니다.";
          return;
        }

        window.location.href = "/dashboard";
      });
    </script>
  </body>
</html>
