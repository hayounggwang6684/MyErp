<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PAGE_TITLE}}</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="brand-panel">
        <p class="brand-top">SHERWOOD</p>
        <h1 class="brand-title">(주)선진종합</h1>
        <p class="brand-subtitle">
          Engine Repair &amp; Parts Sales ERP. 수리 접수, 부품 판매, 재고, 출하, 청구 업무를 하나의 흐름으로 관리합니다.
        </p>
        <div class="brand-tags">
          <span>Repair</span>
          <span>Parts Sales</span>
          <span>Inventory</span>
        </div>
      </section>
      <section class="auth-side">
        <article class="auth-card">
          <div class="topline">
            <span class="status-badge {{STATUS_BADGE_CLASS}}">{{STATUS_BADGE_TEXT}}</span>
          </div>
          <h2 class="card-title">계정 로그인</h2>
          <p class="card-copy">API 연계: <code>POST /api/v1/auth/login</code></p>

          <form id="login-form">
            <div class="field">
              <label for="login-id">아이디</label>
              <input id="login-id" name="username" class="text-field" value="ha" />
            </div>

            <div class="field">
              <label for="login-password">비밀번호</label>
              <input id="login-password" name="password" class="password-field" type="password" value="1234" />
            </div>

            <input type="hidden" name="device_id" value="device-win-001" />

            <div id="feedback" class="message {{FEEDBACK_CLASS}}">{{FEEDBACK_MESSAGE}}</div>

            <div class="button-row">
              <button class="primary-button" type="submit">로그인</button>
              <a class="secondary-button" href="/admin/login">관리자 로그인</a>
            </div>
          </form>

          <div class="helper-links">
            <span>도움말</span>
            <span>보안 안내</span>
          </div>
        </article>
      </section>
    </main>
    <script>
      const loginForm = document.getElementById("login-form");
      const feedback = document.getElementById("feedback");

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(loginForm);
        const payload = Object.fromEntries(formData.entries());

        const response = await fetch("/api/v1/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-demo-mtls-verified": "true"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok) {
          feedback.className = "message error";
          feedback.textContent = result.message || "로그인에 실패했습니다.";
          return;
        }

        window.location.href = "/mfa/verify";
      });
    </script>
  </body>
</html>
