<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PAGE_TITLE}}</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="brand-panel">
        <p class="brand-top">SHERWOOD</p>
        <h1 class="brand-title">(주)선진종합</h1>
        <p class="brand-subtitle">
          관리자 화면은 같은 디자인 시스템을 공유하지만 배포 경계에서 로컬 전용으로 보호됩니다.
        </p>
        <div class="brand-tags">
          <span>Local Admin</span>
          <span>Audit</span>
          <span>Security</span>
        </div>
      </section>
      <section class="auth-side">
        <article class="auth-card">
          <div class="topline">
            <span class="status-badge {{STATUS_BADGE_CLASS}}">{{STATUS_BADGE_TEXT}}</span>
            <span class="local-badge">Mac mini only</span>
          </div>
          <h2 class="card-title">관리자 로그인</h2>
          <p class="card-copy">관리자 전용 로컬 진입 화면 시연</p>

          <div class="field">
            <label for="admin-id">아이디</label>
            <input id="admin-id" class="text-field" value="admin.ha" />
          </div>

          <div class="field">
            <label for="admin-password">비밀번호</label>
            <input id="admin-password" class="password-field" type="password" value="dudrhkd2026!" />
          </div>

          <div class="message {{FEEDBACK_CLASS}}">{{FEEDBACK_MESSAGE}}</div>

          <div class="button-row">
            <a class="primary-button" href="/login">일반 로그인으로 돌아가기</a>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
