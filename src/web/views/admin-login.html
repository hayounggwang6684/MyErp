<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PAGE_TITLE}}</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="brand-panel">
        <p class="brand-top">SHERWOOD</p>
        <h1 class="brand-title">(주)선진종합</h1>
        <p class="brand-subtitle">
          관리자 화면은 같은 디자인 시스템을 공유하지만 배포 경계에서 로컬 전용으로 보호됩니다.
        </p>
        <div class="brand-tags">
          <span>Local Admin</span>
          <span>Audit</span>
          <span>Security</span>
        </div>
      </section>
      <section class="auth-side">
        <article class="auth-card">
          <div class="topline">
            <span class="status-badge {{STATUS_BADGE_CLASS}}">{{STATUS_BADGE_TEXT}}</span>
            <span class="local-badge">Mac mini only</span>
          </div>
          <h2 class="card-title">관리자 로그인</h2>
          <p class="card-copy">Mac mini 로컬에서 운영 현황, 사용자 관리, 업데이트 관리, 감사 로그를 확인합니다.</p>

          <form id="admin-login-form">
            <div class="field">
              <label for="admin-id">아이디</label>
              <input id="admin-id" name="username" class="text-field" />
            </div>

            <div class="field">
              <label for="admin-password">비밀번호</label>
              <input id="admin-password" name="password" class="password-field" type="password" />
            </div>

            <input type="hidden" name="device_id" value="admin-mac-local-001" />

            <div id="admin-feedback" class="message {{FEEDBACK_CLASS}}">{{FEEDBACK_MESSAGE}}</div>

            <div class="button-row">
              <button class="primary-button" type="submit">관리자 로그인</button>
              <a class="secondary-button" href="/login">일반 로그인으로 돌아가기</a>
            </div>
          </form>
        </article>
      </section>
    </main>
    <script>
      const form = document.getElementById("admin-login-form");
      const feedback = document.getElementById("admin-feedback");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(form).entries());

        const response = await fetch("/admin/api/v1/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-demo-mtls-verified": "true"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok) {
          feedback.className = "message error";
          feedback.textContent = result.message || "관리자 로그인에 실패했습니다.";
          return;
        }

        window.location.href = "/admin/dashboard";
      });
    </script>
  </body>
</html>
