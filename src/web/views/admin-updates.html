<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PAGE_TITLE}}</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="side-nav">
        <p class="brand-top">SHERWOOD</p>
        <h1 class="nav-title">관리자 로컬</h1>
        <p class="nav-copy">서버와 클라이언트의 배포 상태를 확인하고 운영 반영 순서를 점검합니다.</p>
        <div class="nav-section">
          <a class="nav-link" href="/admin/dashboard">운영 현황</a>
          <a class="nav-link" href="/admin/users">사용자 관리</a>
          <a class="nav-link active" href="/admin/updates">업데이트 관리</a>
          <a class="nav-link" href="/admin/audit">감사 로그</a>
        </div>
      </aside>

      <section class="dashboard-main">
        <header class="top-bar">
          <div>
            <h1>업데이트 관리</h1>
            <p>{{ADMIN_NAME}} · {{ADMIN_ROLE}}</p>
          </div>
          <div class="button-row">
            <button id="updates-refresh" class="ghost-button" type="button">상태 새로고침</button>
            <button id="admin-logout" class="secondary-button" type="button">로그아웃</button>
          </div>
        </header>

        <section class="info-grid admin-summary-grid" id="updates-grid"></section>

        <section class="panel-grid">
          <article class="info-card">
            <p class="eyebrow">서버 반영 절차</p>
            <ol class="ordered-list" id="server-steps"></ol>
          </article>
          <article class="info-card">
            <p class="eyebrow">클라이언트 배포 메모</p>
            <ul class="ordered-list" id="client-notes"></ul>
            <div id="updates-feedback" class="message info">업데이트 상태를 불러오는 중입니다.</div>
          </article>
        </section>
      </section>
    </main>

    <script>
      const grid = document.getElementById("updates-grid");
      const feedback = document.getElementById("updates-feedback");
      const serverSteps = document.getElementById("server-steps");
      const clientNotes = document.getElementById("client-notes");

      function setMessage(kind, message) {
        feedback.className = `message ${kind}`;
        feedback.textContent = message;
      }

      async function loadUpdates() {
        const response = await fetch("/admin/api/v1/updates");
        const result = await response.json();

        if (!response.ok) {
          setMessage("error", result.message || "업데이트 상태를 불러오지 못했습니다.");
          if (response.status === 401 || response.status === 403) {
            window.location.href = "/admin/login";
          }
          return;
        }

        const data = result.data;
        grid.innerHTML = [
          { label: "현재 서버 버전", value: data.serverVersion, detail: "Mac mini 로컬 실행 기준" },
          { label: "최신 클라이언트 버전", value: data.latestClientReleaseVersion, detail: "GitHub Releases 기준" },
          { label: "배포 채널", value: data.releaseChannel, detail: "일반 사용자 Windows 클라이언트" }
        ].map((card) => `
          <article class="info-card">
            <p class="eyebrow">${card.label}</p>
            <p class="metric">${card.value}</p>
            <p class="detail">${card.detail}</p>
          </article>
        `).join("");

        serverSteps.innerHTML = data.serverUpdateSteps.map((step) => `<li>${step}</li>`).join("");
        clientNotes.innerHTML = data.clientUpdateNotes.map((note) => `<li>${note}</li>`).join("");
        setMessage("info", "서버는 수동 반영, 클라이언트는 GitHub Releases 자동 업데이트 기준으로 운영합니다.");
      }

      document.getElementById("updates-refresh").addEventListener("click", loadUpdates);
      document.getElementById("admin-logout").addEventListener("click", async () => {
        await fetch("/admin/api/v1/auth/logout", { method: "POST" });
        window.location.href = "/admin/login";
      });

      loadUpdates().catch(() => {
        setMessage("error", "업데이트 관리 화면 초기화에 실패했습니다.");
      });
    </script>
  </body>
</html>
